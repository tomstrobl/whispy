# DragAndDropMUSHRA — layout & behavior.
# The look (colors, fonts, button styling) is inherited from the global theme
# in configs/design.yml so every listening test matches. To override a theme
# key for this UI only, add it here (it takes precedence over design.yml).

# -------------------------------- Layout ----------------------------------- #
# Window size. Either [pixels_x, pixels_y] or "fullscreen".
window_size: fullscreen
# Rating area size as a percentage of the window size.
# Use 100 for the maximally possible size.
rating_area_size: [75, 50]

# -------------------------------- Behaviour -------------------------------- #
# Play the reference automatically after the test conditions, and the delay
# (in seconds) before that autoplay.
autoplay_reference: true
autoplay_delay: 0.1
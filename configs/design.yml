# general:

# Window size. Either [pixels_x, pixels_y] or "fullscreen"
window_size: [1000, 600]

# overall color theme
fontcolor: "#e8eaed"
window_background_color: "#94b1ff" # perano
rating_area_background_color: "#D3DFFF"
edge_color: "#454545"
# color theme for the rating buttons
button_color_initial: "#5E72A3"
button_color_clicked: "#BACDFF"
button_color_active: "#a5d6a7"
button_fontcolor_initial: "#ffffff"
button_fontcolor: "#2b2b2b"
button_hover_background_color: "#708edb"
button_border_radius: '10px'
# Size for all other text
fontsize: 16

# drag_and_drop_mushra:

# rounded edges for stop and continue button
stop_continue_button_border_radius: "3px"
# look of rating buttons
button_size: 40
button_fontsize: 16
button_spacing: 16
# Rating area size.
# Percentage with respect to window size.
# Use 100% for maximally possible size.
rating_area_size: [75, 50]

# n_afc:

# The task is a string displayed on top of the GUI
# This defines the fontsize and the space between
# the task and the rating interface in pixel
task_spacing: 24
# submit-hint defaults
submit_hint: "Bitte einen Stimulus anhören, auswählen und dann bestätigen."
# submit_hint: "Listen to a stimulus, select one, then submit."
submit_hint_fontsize: 14
submit_button_text: "Submit choice"
submit_button_text_color: "#BACDFF"


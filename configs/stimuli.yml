# Define stimuli as required by different Handlers
# - Not all defined stimuli must be used. All required stimuli must be defined.
# - Not all defined Handlers must be used. At least the required Handler must
#   be defined.
#
# Stimuli are named 1, 2, and 3 here but can have any names or numbers. It is
# best practice to use descriptive names because the names will be saved as
# part of the results of an experiment.

SoundDevice:
  1:
    file: stimulus_1.wav
  2:
    file: stimulus_2.wav
  3:
    file: stimulus_3.wav
  4:
    file: stimulus_4.wav

OSCHandler:
  1:
    messages: [/select 1, /play]
  2:
    messages: [/select 2, /play]
  3:
    messages: [/select 3, /play]
  4:
    messages: [/select 4, /play]

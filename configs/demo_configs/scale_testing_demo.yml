# =============================================================================
# Audience demo - scale testing on funny sounds
# =============================================================================
# Demo variant of configs/scale_testing.yml, used by
# examples/full_experiment_audience_demo.ipynb. Same three consumers:
#   - SoundDevice   -> the `SoundDevice:` block (which WAV plays for each id)
#   - ScaleTest     -> the `ui:` and `questions:` blocks
#   - the scheduler -> the `experiment:` block
#
# Two funny/memorable clips rated on three humorous scales - one question per
# interaction method (buttons, slider, bipolar_slider) so the audience sees
# every scale widget in ~1 minute.

# ------------------------------- Stimuli ----------------------------------- #
# WAVs live in examples/demo_stimuli/audience_demo/ (regenerate with
# generate_audience_demo_stimuli.py). `alien_chatter` is a spare: add it to
# the `test:` list below for a third screen.
SoundDevice:
  boing:         { file: boing.wav }          # cartoon spring
  sad_trombone:  { file: sad_trombone.wav }   # wah wah wah waaah
  alien_chatter: { file: alien_chatter.wav }  # random bleeps (spare)

# ------------------------------ Questions ---------------------------------- #
# The scales stacked below the play button, shown in this order on EVERY
# screen (see configs/scale_testing.yml for the full key reference).
questions:
  - id: weirdness
    prompt: "How **weird** is this sound?"
    scale_type: likert
    interaction_method: buttons
    scale_range: [1, 5]
    labels: ["not weird at all", "extremely weird"]
  - id: funniness
    prompt: "How **funny** is this sound?"
    scale_type: continuous
    interaction_method: slider
    scale_range: [0, 100]
    labels: ["not funny", "hilarious"]
  - id: ringtone
    prompt: "Would you set this sound as your **ringtone**?"
    scale_type: bipolar
    interaction_method: bipolar_slider
    scale_range: [-5, 5]
    labels: ["never", "unsure", "absolutely"]

# ---------------------------- ScaleTest window ------------------------------ #
ui:
  content_area_size: [70, 90]
  button_fontsize: 8             # numbers on the scale buttons (design.yml: 16)
  submit_button_fontsize: 14     # the "Submit ratings" button (design.yml: 16)
  play_button_text: "► Play"
  submit_hint: "Press Space (or click Play) to listen, rate every scale, then press Enter to submit."
  submit_button_text: "Submit ratings"
  show_progress: true
  progress_text: "Trial {current} of {total}"

# -------------------------------- Trial ------------------------------------ #
trial:
  task: "Listen to the sound and rate it on every scale below."

# ------------------------------ Experiment --------------------------------- #
# Which stimuli are rated (one per screen, order randomized by the scheduler).
experiment:
  - block:
      - block_name: funny sounds
      - section:
          section_name: novelty audio
          test: [boing, sad_trombone]

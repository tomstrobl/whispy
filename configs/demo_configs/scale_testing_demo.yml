# =============================================================================
# Audience demo - scale testing on funny sounds (per-stimulus questions)
# =============================================================================
# Demo variant of configs/scale_testing.yml, used by
# examples/full_experiment_audience_demo.ipynb. Demonstrates per-stimulus
# questions: same three consumers, but each stimulus is rated on different
# scales.
#
#   - SoundDevice   -> the `SoundDevice:` block (which WAV plays for each id)
#   - ScaleTest     -> the `ui:` and `per_stimulus_questions:` blocks
#   - the scheduler -> the `experiment:` block
#
# Three funny/memorable clips rated on different scales:
#   - boing (5 questions): energy, familiarity, weirdness, funniness, ringtone
#   - sad_trombone (3 questions): sadness, funniness, effectiveness
#   - alien_chatter (1 question): alien/weirdness
#
# This demonstrates that stimuli can be rated independently on different scales.

# ------------------------------- Stimuli ----------------------------------- #
# WAVs live in examples/demo_stimuli/audience_demo/ (regenerate with
# generate_audience_demo_stimuli.py).
SoundDevice:
  boing:         { file: boing.wav }          # cartoon spring
  sad_trombone:  { file: sad_trombone.wav }   # wah wah wah waaah
  alien_chatter: { file: alien_chatter.wav }  # random bleeps (spare)

# ------------------------------ Questions ---------------------------------- #
# Demonstrate per-stimulus questions: different stimuli rated on different scales.
# Each stimulus below has its own set of questions, showing that boing gets 5
# questions, sad_trombone gets 3, and alien_chatter gets just 1.

# Global fallback (not used here since all stimuli have per_stimulus_questions)
questions:
  - id: weirdness
    prompt: "How **weird** is this sound?"
    scale_type: likert
    interaction_method: buttons
    scale_range: [1, 7]
    labels: ["not weird at all", "extremely weird"]

# Per-stimulus questions: each stimulus rated on different scales
per_stimulus_questions:
  boing:
    # 5 questions for the boing sound
    - id: weirdness
      prompt: "How **weird** is this sound?"
      scale_type: likert
      interaction_method: buttons
      scale_range: [1, 7]
      labels: ["not weird at all", "extremely weird"]
    - id: funniness
      prompt: "How **funny** is this sound?"
      scale_type: continuous
      interaction_method: slider
      scale_range: [0, 100]
      labels: ["not funny", "hilarious"]
    - id: ringtone
      prompt: "Would you set this sound as your **ringtone**?"
      scale_type: bipolar
      interaction_method: buttons
      scale_range: [-5, 5]
      labels: ["never", "absolutely"]
    - id: energy
      prompt: "How **energetic** does this sound feel?"
      scale_type: likert
      interaction_method: buttons
      scale_range: [1, 5]
      labels: ["low energy", "high energy"]
    - id: familiarity
      prompt: "How **familiar** is this sound?"
      scale_type: likert
      interaction_method: buttons
      scale_range: [1, 5]
      labels: ["never heard", "rarely", "sometimes", "often", "all the time"]
  sad_trombone:
    # 3 questions for the sad trombone
    - id: sadness
      prompt: "How **sad** does this sound?"
      scale_type: continuous
      interaction_method: slider
      scale_range: [0, 100]
      labels: ["not sad", "extremely sad"]
    - id: funniness
      prompt: "How **funny** is this sound?"
      scale_type: likert
      interaction_method: buttons
      scale_range: [1, 5]
      labels: ["not funny", "very funny"]
    - id: effectiveness
      prompt: "How **effective** is this as a \"fail\" sound?"
      scale_type: bipolar
      interaction_method: buttons
      scale_range: [-5, 5]
      labels: ["not effective", "extremely effective"]
  alien_chatter:
    # 1 question for the alien chatter (minimal)
    - id: weirdness
      prompt: "How **alien** does this sound?"
      scale_type: likert
      interaction_method: buttons
      scale_range: [1, 7]
      labels: ["very human-like", "extremely alien"]

# ---------------------------- ScaleTest window ------------------------------ #
ui:
  content_area_size: [70, 90]
  button_fontsize: 8             # numbers on the scale buttons (design.yml: 16)
  submit_button_fontsize: 14     # the "Submit ratings" button (design.yml: 16)
  play_button_text: "► Play"
  submit_hint: "Press Space (or click Play) to listen, rate every scale, then press Enter to submit."
  submit_button_text: "Submit ratings"
  show_progress: true
  progress_text: "Trial {current} of {total}"

# -------------------------------- Trial ------------------------------------ #
trial:
  task: "Listen to the sound and rate it on every scale below."

# ------------------------------ Experiment --------------------------------- #
# Which stimuli are rated (one per screen, order randomized by the scheduler).
# Three stimuli demonstrate per-stimulus questions:
#   - boing: 5 questions (energy, familiarity, weirdness, funniness, ringtone)
#   - sad_trombone: 3 questions (sadness, funniness, effectiveness)
#   - alien_chatter: 1 question (weirdness/alien)
experiment:
  - block:
      - block_name: funny sounds
      - section:
          section_name: novelty audio
          test: [boing, sad_trombone, alien_chatter]

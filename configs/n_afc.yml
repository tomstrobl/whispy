# NAFC — test parameters, behavior & wording.
# The look (colors, fonts, button styling) is inherited from the global theme
# in configs/design.yml so every listening test matches. Override individual
# theme keys under `ui:` if needed.

ui:
  # Window size. Either [pixels_x, pixels_y] or "fullscreen".
  window_size: fullscreen
  # Content area size (task + buttons + submit) as a percentage [x%, y%] of the
  # window, centered. Same key/behavior as every test; 100 = max available.
  content_area_size: [75, 80]
  # Hint shown below the choice buttons and the submit-button label.
  submit_hint: "Listen to a stimulus, select one, then submit."
  submit_button_text: "Submit choice"
  # ---- Font sizes (each scales with the window height) ----
  # One key per text, fully independent of each other.
  task_fontsize: 16              # task prompt at the top
  submit_hint_fontsize: 12       # hint below the choice buttons
  button_fontsize: 16            # numbers on the choice buttons
  submit_button_fontsize: 16     # the "Submit choice" button

# test-specific defaults
test:
  n_choices: 3
  shuffle_choices: true

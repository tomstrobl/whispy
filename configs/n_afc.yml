# NAFC — test parameters, behavior & wording.
# The look (colors, fonts, button styling) is inherited from the global theme
# in configs/design.yml so every listening test matches. Override individual
# theme keys under `ui:` if needed.

ui:
  # The look (window size, fonts, spacings, ...) lives in configs/design.yml;
  # add any design key here to override it. This block keeps the wording plus
  # three overrides this package default has always used.
  submit_hint_fontsize: 12       # hint below the choice buttons (design.yml: 6)
  progress_fontsize: 11          # "Trial X of Y" text (design.yml: 6)
  submit_hint_spacing: 12        # submit-to-hint gap (design.yml: 16)
  # Hint shown below the choice buttons and the submit-button label.
  submit_hint: "Listen to a stimulus, select one, then submit."
  submit_button_text: "Submit choice"
  # Trial progress bar ("Trial X of Y") below the submit button, so the
  # participant knows how many trials are left. Shown when the screen dict
  # carries a `progress` entry (whispy.Staircase adds one automatically; its
  # total is max_trials, the upper bound). The text may use {current}, {total}
  # and {remaining}; its look comes from design.yml.
  show_progress: true
  progress_text: "Trial {current} of {total}"

# test-specific defaults
test:
  n_choices: 3
  shuffle_choices: true
  # If true, each interval can be heard at most twice: the first (mandatory)
  # listen plus a single replay. False allows unlimited replays.
  single_replay: false
  # If true, every trial starts by playing all intervals once in button order
  # (the playing button is highlighted). This counts as the mandatory first
  # listen (and as the first play for single_replay); clicking or pressing a
  # key interrupts the run-through.
  autoplay: false
  autoplay_gap: 0.3   # seconds of silence between autoplayed intervals

# N-AFC UI and test defaults
ui:
  window_size: [1100, 550]
  fontcolor: "#e8eaed"
  window_background_color: "#2b2b2b"
  button_size: 56
  button_fontsize: 16
  button_spacing: 8
  button_background_color: "#3c4043"
  button_text_color: "#ffffff"
  button_selected_background_color: "#8ab4f8"
  button_selected_text_color: "#202124"
  task_fontsize: 16
  task_spacing: 16
  submit_hint: "Bitte einen Stimulus anhoeren, auswaehlen und dann abschicken."
  submit_button_text: "Auswahl abschicken"

# test-specific defaults
test:
  n_choices: 3
  shuffle_choices: true
  feedback: false
  autoplay_stimulus_on_present: true
  autoplay_delay: 0.1

